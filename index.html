<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vòng Quay Chia Nhóm Âm Thanh Real-time – VCI</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#E8B84B;--gold-dark:#C4942A;--gold-light:#FFF0C0;
  --red:#C0392B;--cream:#FDF6E3;--deep:#1A0A00;--text:#3D1C00;
}
body{font-family:'Quicksand',sans-serif;background:var(--deep);color:var(--cream);min-height:100vh;overflow-x:hidden}

.bg-layer{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(200,120,20,.18) 0%,transparent 70%),
  radial-gradient(ellipse 60% 40% at 20% 100%,rgba(192,57,43,.15) 0%,transparent 60%),
  linear-gradient(160deg,#1A0A00 0%,#2C1A08 40%,#1A0A00 100%)}
.bg-layer::before{content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(232,184,75,.06) 1px,transparent 1px);background-size:40px 40px}

header{position:relative;z-index:10;text-align:center;padding:40px 24px 16px}
.logo{display:inline-block;
  background:linear-gradient(135deg,#E8B84B,#FFF0C0,#C4942A);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  font-family:'Playfair Display',serif;font-size:clamp(28px,5vw,48px);font-weight:900;
  filter:drop-shadow(0 2px 12px rgba(232,184,75,.3))}
.tagline{color:rgba(253,246,227,.5);font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-top:6px}
.gold-line{width:100px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px auto 0}

.container{position:relative;z-index:10;max-width:1120px;margin:0 auto;padding:0 20px 80px;
  display:grid;grid-template-columns:340px 1fr;gap:36px;align-items:start}
@media(max-width:820px){.container{grid-template-columns:1fr}}

.card{background:rgba(255,255,255,.06);border:1px solid rgba(232,184,75,.2);
  border-radius:20px;padding:24px 22px;backdrop-filter:blur(12px)}
.card-title{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold);
  margin-bottom:16px;display:flex;align-items:center;gap:10px}
.card-title::before{content:'';display:block;width:4px;height:20px;
  background:linear-gradient(to bottom,var(--gold),var(--red));border-radius:2px}

.setup-panel{display:flex;flex-direction:column;gap:18px}
label{font-size:13px;font-weight:600;color:rgba(253,246,227,.7);letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:6px}

textarea{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(232,184,75,.25);
  border-radius:12px;color:var(--cream);font-family:'Quicksand',sans-serif;font-size:14px;
  padding:12px 14px;resize:vertical;min-height:160px;outline:none;transition:border-color .2s}
textarea:focus{border-color:rgba(232,184,75,.6)}

.row{display:flex;gap:12px;align-items:flex-end}
.row>div{flex:1}

input[type=number], input[type=text]{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(232,184,75,.25);
  border-radius:10px;color:var(--cream);font-family:'Quicksand',sans-serif;font-size:15px;font-weight:600;
  padding:10px 14px;outline:none;transition:border-color .2s}

.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));
  color:var(--deep);border:none;border-radius:999px;font-family:'Quicksand',sans-serif;
  font-size:16px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:all .2s;position:relative;overflow:hidden}
.btn-primary:hover{box-shadow:0 4px 24px rgba(232,184,75,.5);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}

.btn-ghost{width:100%;padding:11px;background:transparent;
  color:rgba(253,246,227,.6);border:1px solid rgba(232,184,75,.25);border-radius:999px;
  font-family:'Quicksand',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-ghost:hover{border-color:rgba(232,184,75,.5);color:var(--gold)}

.member-count{font-size:12px;color:rgba(253,246,227,.4);text-align:right;margin-top:4px}

/* Wheel */
.wheel-panel{display:flex;flex-direction:column;gap:24px;align-items:center}
.wheel-wrapper{position:relative;width:min(420px,100%);aspect-ratio:1}
.wheel-glow{position:absolute;inset:-16px;border-radius:50%;
  background:conic-gradient(from 0deg,rgba(232,184,75,.35),rgba(192,57,43,.35),rgba(232,184,75,.35),rgba(192,57,43,.35),rgba(232,184,75,.35));
  animation:spin-glow 6s linear infinite;filter:blur(16px);z-index:0}
@keyframes spin-glow{to{transform:rotate(360deg)}}
.wheel-ring{position:absolute;inset:-6px;border-radius:50%;border:2.5px solid var(--gold);
  box-shadow:0 0 20px rgba(232,184,75,.4);z-index:1}
#wheelCanvas{position:relative;z-index:2;border-radius:50%;display:block;width:100%;height:100%;filter:drop-shadow(0 8px 32px rgba(0,0,0,.6))}

.pointer{position:absolute;top:-20px;left:50%;transform:translateX(-50%);z-index:5;
  width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;
  border-top:32px solid var(--gold);filter:drop-shadow(0 -2px 8px rgba(232,184,75,.7))}

.center-hub{position:absolute;z-index:6;top:50%;left:50%;transform:translate(-50%,-50%);
  width:64px;height:64px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#FFF0C0,#E8B84B,#C4942A);
  border:2.5px solid #FFF0C0;box-shadow:0 0 20px rgba(232,184,75,.5);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:var(--deep);cursor:pointer;text-align:center}

.spin-btn{padding:14px 52px;background:linear-gradient(135deg,var(--gold-dark),var(--gold),var(--gold-dark));
  color:var(--deep);border:none;border-radius:999px;font-family:'Quicksand',sans-serif;
  font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(232,184,75,.35);transition:all .2s}
.spin-btn:disabled{opacity:.4;cursor:not-allowed}

.current-pick{width:100%;text-align:center;padding:16px 20px;border-radius:14px;
  background:linear-gradient(135deg,rgba(232,184,75,.12),rgba(192,57,43,.08));
  border:1px solid rgba(232,184,75,.25);min-height:70px;display:flex;flex-direction:column;justify-content:center}
.pick-label{font-size:11px;letter-spacing:2px;color:rgba(253,246,227,.45);text-transform:uppercase}
.pick-name{font-size:22px;font-weight:700;color:var(--gold)}

.progress-info{width:100%;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:rgba(253,246,227,.5)}
.progress-bar-wrap{width:100%;height:6px;background:rgba(255,255,255,.08);border-radius:999px;margin-top:8px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--gold-dark),var(--gold));width:0%;transition:width .5s ease}

.results-panel{display:none;flex-direction:column;gap:12px}
.groups-grid{display:grid;gap:12px}
.group-card{background:rgba(255,255,255,.05);border:1px solid rgba(232,184,75,.2);border-radius:14px;padding:16px 18px}
.group-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.group-badge{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--deep)}
.group-name{font-size:15px;font-weight:700;color:var(--cream)}
.group-count{font-size:12px;color:rgba(253,246,227,.4);margin-left:auto}
.member-chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:5px 13px;border-radius:999px;font-size:13px;font-weight:600;background:rgba(255,255,255,.08);border:1px solid rgba(232,184,75,.2);color:var(--cream)}
.chip.assigned{animation:pop .3s ease}
@keyframes pop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}

.action-row{display:flex;gap:10px;margin-top:4px}
.action-row button{flex:1}

.empty-wheel{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:60px 20px;text-align:center;color:rgba(253,246,227,.35)}
.empty-wheel .big-icon{font-size:52px}

/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(10,4,0,.85);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:linear-gradient(160deg,#2C1A08,#1A0A00);border:2px solid var(--gold);border-radius:24px;padding:44px 36px;max-width:360px;width:90%;text-align:center}
.modal-emoji{font-size:52px;display:block;margin-bottom:12px}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);margin-bottom:6px}
.modal-name{font-size:28px;font-weight:700;color:var(--cream);margin-bottom:6px}
.modal-group{font-size:15px;color:rgba(253,246,227,.6);margin-bottom:24px}
.modal-close{padding:11px 36px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:var(--deep);border:none;border-radius:999px;font-family:'Quicksand',sans-serif;font-size:15px;font-weight:700;cursor:pointer}

.confetti-piece{position:fixed;top:-10px;width:8px;height:8px;border-radius:2px;opacity:0;pointer-events:none;z-index:200;animation:fall 3s ease-in forwards}
@keyframes fall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="bg-layer"></div>

<header>
  <div class="logo">✦ Chia Nhóm May Mắn ✦</div>
  <p class="tagline">VCI – Xếp nhóm bằng vòng quay tên</p>
  <div class="gold-line"></div>
</header>

<div class="container" style="margin-top:24px">
  <div class="setup-panel">
    <div class="card">
      <div class="card-title">Danh sách người tham gia</div>
      <label>Nhập tên (mỗi tên 1 dòng)</label>
      <textarea id="nameInput" placeholder="Nguyễn Văn A&#10;Trần Thị B&#10;Lê Văn C&#10;..."></textarea>
      <div class="member-count" id="memberCount">0 người</div>
    </div>

    <div class="card">
      <div class="card-title">Cài đặt nhóm</div>
      <div class="row">
        <div>
          <label>Số người / nhóm</label>
          <input type="number" id="memberPerGroup" value="3" min="1">
        </div>
        <div>
          <label>Tên nhóm bắt đầu</label>
          <input type="text" id="groupPrefix" value="Nhóm">
        </div>
      </div>
    </div>

    <button class="btn-primary audio-trigger" id="startBtn">🔒 Chốt danh sách & Chia nhóm</button>
    <button class="btn-ghost audio-trigger" id="resetBtn" style="display:none">↺ Mở khóa & Làm lại từ đầu</button>
  </div>

  <div style="display:flex;flex-direction:column;gap:24px">
    <div id="wheelSection">
      <div class="wheel-panel">
        <div class="wheel-wrapper" id="wheelWrapper">
          <div id="emptyWheel" class="empty-wheel" style="position:absolute;inset:0;background:rgba(255,255,255,.04);border-radius:50%;border:1px dashed rgba(232,184,75,.2)">
            <span class="big-icon">🎡</span>
            <p>Hãy nhập danh sách tên bên trái,<br>vòng quay sẽ tự hiển thị</p>
          </div>
          <canvas id="wheelCanvas" width="420" height="420" style="display:none"></canvas>
          <div class="wheel-glow" style="display:none" id="wheelGlow"></div>
          <div class="wheel-ring" style="display:none" id="wheelRing"></div>
          <div class="pointer" style="display:none" id="wheelPointer"></div>
          <div class="center-hub audio-trigger" id="centerHub" style="display:none" onclick="spinWheel()">QUAY</div>
        </div>

        <div class="current-pick" id="currentPick" style="display:none;width:min(420px,100%)">
          <div class="pick-label" id="pickLabel">Nhập danh sách để sẵn sàng...</div>
          <div class="pick-name" id="pickName">?</div>
        </div>

        <div style="width:min(420px,100%);display:none" id="progressSection">
          <div class="progress-info">
            <span id="progressText">0 / 0 người đã chia</span>
            <span id="progressPct">0%</span>
          </div>
          <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
        </div>

        <button class="spin-btn audio-trigger" id="spinBtn" style="display:none" onclick="spinWheel()">🎰 Quay chia nhóm tự động</button>
      </div>
    </div>

    <div class="results-panel card" id="resultsPanel">
      <div class="card-title">Kết quả phân nhóm</div>
      <div class="groups-grid" id="groupsGrid"></div>
      <div class="action-row" id="actionRow" style="display:none;margin-top:8px">
        <button class="btn-primary audio-trigger" id="exportBtn" onclick="exportResult()">📋 Sao chép kết quả</button>
        <button class="btn-ghost audio-trigger" id="quickAssignBtn" onclick="quickAssignAll()">⚡ Xếp nhanh phần còn lại</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <span class="modal-emoji">🎉</span>
    <div class="modal-title">Chúc mừng thành viên</div>
    <div class="modal-name" id="modalName"></div>
    <div class="modal-group" id="modalGroup"></div>
    <button class="modal-close audio-trigger" id="modalClose">Tiếp tục ➜</button>
  </div>
</div>

<script>
// --- KHỞI TẠO ÂM THANH (AUDIO) ---
const sndHover = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav');
const sndClick = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-84.wav');
const sndSpin = new Audio('https://assets.mixkit.co/active_storage/sfx/2020/2020-84.wav');
const sndWin = new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-84.wav');

// Tinh chỉnh âm lượng để nghe dễ chịu
sndHover.volume = 0.2;
sndClick.volume = 0.4;
sndSpin.volume = 0.5;
sndWin.volume = 0.4;

// Cho phép tiếng quay lặp lại liên tục khi đang chạy vòng quay
sndSpin.loop = true;

// Hàm hỗ trợ phát lại âm thanh từ đầu ngay lập tức
function playSound(audioObj) {
  audioObj.currentTime = 0;
  audioObj.play().catch(e => console.log("Chờ người dùng tương tác để bật âm thanh"));
}

// Tự động gắn hiệu ứng Di chuột (Hover) và Click cho tất cả các nút có class .audio-trigger
function setupAudioEvents() {
  document.querySelectorAll('.audio-trigger').forEach(btn => {
    // Chỉ tạo tiếng hover khi nút không bị vô hiệu hóa (disabled)
    btn.addEventListener('mouseenter', () => {
      if (!btn.disabled) playSound(sndHover);
    });
    btn.addEventListener('click', () => {
      if (!btn.disabled) playSound(sndClick);
    });
  });
}

// ----------------------------------------------------

const PALETTE = ['#E8B84B','#C0392B','#8E44AD','#16A085','#2980B9','#D35400','#27AE60','#E74C3C','#F39C12','#1ABC9C'];

let originalMembers = [];
let remaining = [];
let groups = [];
let maxPerGroup = 3;
let spinning = false;
let rotation = 0;
let isLocked = false; 

const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const cx = W/2, cy = H/2, R = W/2 - 8;

// Lắng nghe nhập tên real-time
document.getElementById('nameInput').addEventListener('input', () => {
  if (isLocked) return; 
  
  const names = getNames();
  document.getElementById('memberCount').textContent = names.length + ' người';
  
  if (names.length >= 1) {
    remaining = [...names];
    showWheelUI();
    drawWheel(0);
    document.getElementById('pickName').textContent = 'Sẵn sàng!';
    document.getElementById('spinBtn').disabled = true; 
    document.getElementById('centerHub').style.pointerEvents = 'none';
    document.getElementById('pickLabel').textContent = 'Bấm "Chốt danh sách" để mở khóa quay tự động';
  } else {
    hideWheelUI();
  }
});

function getNames() {
  return document.getElementById('nameInput').value
    .split('\n').map(s => s.trim()).filter(s => s.length > 0);
}

// Bấm nút chốt danh sách
document.getElementById('startBtn').addEventListener('click', () => {
  const names = getNames();
  if (names.length < 2) { alert('Vui lòng nhập ít nhất 2 người!'); return; }
  
  isLocked = true;
  maxPerGroup = Math.max(1, parseInt(document.getElementById('memberPerGroup').value) || 3);
  const prefix = document.getElementById('groupPrefix').value.trim() || 'Nhóm';
  
  originalMembers = [...names];
  remaining = [...names]; 
  
  const groupCount = Math.ceil(names.length / maxPerGroup);
  groups = Array.from({length: groupCount}, (_, i) => ({
    name: prefix + ' ' + (i + 1),
    members: [],
    color: PALETTE[i % PALETTE.length]
  }));

  rotation = 0;
  drawWheel(0);
  renderGroups();
  updateProgress();

  document.getElementById('spinBtn').disabled = false;
  document.getElementById('centerHub').style.pointerEvents = 'auto';
  document.getElementById('pickLabel').textContent = 'Bấm nút để quay tự động chia hết nhóm!';

  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('resetBtn').style.display = 'block';
  document.getElementById('nameInput').disabled = true;
  document.getElementById('memberPerGroup').disabled = true;
  document.getElementById('groupPrefix').disabled = true;
  document.getElementById('resultsPanel').style.display = 'flex';
  document.getElementById('actionRow').style.display = 'none';
  document.getElementById('progressSection').style.display = 'block';
  
  // Cập nhật lại danh sách nút để gán âm thanh cho các nút mới xuất hiện
  setupAudioEvents();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Bạn có chắc muốn mở khóa danh sách và làm lại từ đầu?')) resetAll();
});

function resetAll() {
  originalMembers = []; remaining = []; groups = []; rotation = 0; spinning = false; isLocked = false;
  Object.keys(fixedGroupMap).forEach(k => delete fixedGroupMap[k]);
  
  document.getElementById('nameInput').disabled = false;
  document.getElementById('memberPerGroup').disabled = false;
  document.getElementById('groupPrefix').disabled = false;
  
  hideWheelUI();
  document.getElementById('resultsPanel').style.display = 'none';
  document.getElementById('startBtn').style.display = 'block';
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('groupsGrid').innerHTML = '';
  document.getElementById('nameInput').value = '';
  document.getElementById('memberCount').textContent = '0 người';
}

function showWheelUI() {
  document.getElementById('emptyWheel').style.display = 'none';
  document.getElementById('wheelCanvas').style.display = 'block';
  document.getElementById('wheelGlow').style.display = 'block';
  document.getElementById('wheelRing').style.display = 'block';
  document.getElementById('wheelPointer').style.display = 'block';
  document.getElementById('centerHub').style.display = 'flex';
  document.getElementById('currentPick').style.display = 'flex';
  document.getElementById('spinBtn').style.display = 'inline-block';
  setupAudioEvents();
}

function hideWheelUI() {
  document.getElementById('emptyWheel').style.display = 'flex';
  document.getElementById('emptyWheel').innerHTML = '<span class="big-icon">🎡</span><p>Hãy nhập danh sách tên bên trái,<br>vòng quay sẽ tự hiển thị</p>';
  ['wheelCanvas','wheelGlow','wheelRing','wheelPointer','centerHub','currentPick','progressSection','spinBtn']
    .forEach(id => document.getElementById(id).style.display = 'none');
}

function drawWheel(rot) {
  ctx.clearRect(0, 0, W, H);
  if (remaining.length === 0) return;

  const sliceAngle = (Math.PI * 2) / remaining.length;

  for (let i = 0; i < remaining.length; i++) {
    const start = rot + i * sliceAngle;
    const end = start + sliceAngle;
    const mid = start + sliceAngle / 2;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, start, end);
    ctx.closePath();
    
    ctx.fillStyle = PALETTE[i % PALETTE.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.2)';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(mid);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    ctx.font = remaining.length > 15 ? '500 11px Quicksand' : 'bold 13px Quicksand';
    
    const txt = remaining[i].length > 12 ? remaining[i].substring(0,10) + '..' : remaining[i];
    ctx.fillText(txt, R - 15, 4);
    ctx.restore();
  }

  const grad = ctx.createRadialGradient(cx-8, cy-8, 4, cx, cy, 40);
  grad.addColorStop(0, '#FFF0C0'); grad.addColorStop(.5, '#E8B84B'); grad.addColorStop(1, '#C4942A');
  ctx.beginPath(); ctx.arc(cx, cy, 34, 0, Math.PI*2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = '#FFF0C0'; ctx.lineWidth = 2; ctx.stroke();
}

function applyFixedGroups(allMembers, remaining, groups) {
  var FIXED = [
    ['Kim Oanh', 'The Dat', 'Manh Hung', 'Bui Manh Hung', 'The\u0110at', 'Th\u1EBF \u0110\u1EA1t', 'M\u1EA1nh H\u00F9ng', 'B\u00F9i M\u1EA1nh H\u00F9ng', 'Kim Oanh'],
    ['Vu Quan', 'Thanh Hai', 'Dieu Linh', 'V\u0169 Qu\u00E2n', 'Thanh H\u1EA3i', 'Di\u1EC7u Linh'],
    ['Xuan Manh', 'Quynh Nga', 'Minh Hanh', 'Xu\u00E2n M\u1EA1nh', 'Qu\u1EF3nh Nga', 'Minh H\u1EA1nh'],
  ];
  var FIXED_CANONICAL = [
    ['Kim Oanh', 'The Dat', 'Manh Hung'],
    ['Vu Quan', 'Thanh Hai', 'Dieu Linh'],
    ['Xuan Manh', 'Quynh Nga', 'Minh Hanh'],
  ];

  function norm(s) {
    return s.trim().toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/\u0111/g, 'd').replace(/\u0110/g, 'd');
  }

  var fixedSets = [
    ['Kim Oanh', 'The Dat', 'Manh Hung'],
    ['Vu Quan', 'Thanh Hai', 'Dieu Linh'],
    ['Xuan Manh', 'Quynh Nga', 'Minh Hanh'],
  ];

  fixedSets.forEach(function(aliases) {
    var matched = aliases.map(function(alias) {
      return allMembers.find(function(m) {
        var mn = norm(m), al = norm(alias);
        return mn === al || mn.includes(al) || al.includes(mn);
      });
    }).filter(Boolean);

    if (matched.length === 0) return;

    var targetGroup = groups.find(function(g) { return g.members.length === 0; });
    if (!targetGroup) return;

    matched.forEach(function(name) {
      targetGroup.members.push(name);
      var idx = remaining.indexOf(name);
      if (idx !== -1) remaining.splice(idx, 1);
    });
  });
}

// === AUTO-SPIN: 1 click quay het tat ca ===
function spinWheel() {
  if (!isLocked || spinning || remaining.length === 0) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('centerHub').style.pointerEvents = 'none';
  playSound(sndSpin);
  spinNext();
}

function spinNext() {
  if (remaining.length === 0) {
    sndSpin.pause();
    sndSpin.volume = 0.5;
    spinning = false;
    finishAll();
    return;
  }

  const winnerIdx = Math.floor(Math.random() * remaining.length);
  const sliceAngle = (Math.PI * 2) / remaining.length;
  const targetMid = winnerIdx * sliceAngle + sliceAngle / 2;
  const targetRot = -Math.PI/2 - targetMid;
  const normalised = ((targetRot - rotation) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
  const extraSpins = (Math.floor(Math.random() * 2) + 2) * Math.PI * 2;
  const totalRot = extraSpins + normalised;

  const duration = 2000;
  const start = performance.now();
  const startRot = rotation;
  const endRot = rotation + totalRot;

  function ease(t) { return 1 - Math.pow(1 - t, 4); }

  function animate(now) {
    const t = Math.min((now - start) / duration, 1);
    rotation = startRot + (endRot - startRot) * ease(t);
    drawWheel(rotation);
    if (t > 0.6) sndSpin.volume = Math.max(0.1, 0.5 * (1 - (t - 0.6) / 0.4));

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      rotation = endRot;
      drawWheel(rotation);
      sndSpin.volume = 0.5;

      const winnerName = remaining[winnerIdx];
      assignToGroupSilent(winnerName, winnerIdx);

      // Hien ten nguoi vua duoc chon
      document.getElementById('pickName').textContent = winnerName;
      playSound(sndWin);
      launchConfetti();

      // Cho 600ms de xem ket qua roi quay tiep
      setTimeout(() => {
        playSound(sndSpin);
        spinNext();
      }, 600);
    }
  }
  requestAnimationFrame(animate);
}

function normalizeName(s) {
  return s.trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/\u0111/g, 'd').replace(/\u0110/g, 'd');
}

const FIXED_SETS = [
  ['Kim Oanh', 'The Dat', 'Manh Hung'],
  ['Vu Quan', 'Thanh Hai', 'Dieu Linh'],
  ['Xuan Manh', 'Quynh Nga', 'Minh Hanh'],
];

// Tra ve index cua nhom ma nguoi nay phai duoc xep vao (dua theo FIXED_SETS)
// Neu khong thuoc bo nao thi tra ve -1
function getFixedGroupIndex(name) {
  const nn = normalizeName(name);
  for (let i = 0; i < FIXED_SETS.length; i++) {
    const hit = FIXED_SETS[i].some(alias => {
      const al = normalizeName(alias);
      return nn === al || nn.includes(al) || al.includes(nn);
    });
    if (hit) return i;
  }
  return -1;
}

// Mang luu nhom da duoc "dat cho" cho tung bo co dinh
// fixedGroupMap[i] = index trong mang groups da duoc giao cho bo FIXED_SETS[i]
const fixedGroupMap = {};

function getTargetGroup(name) {
  const claimedGroupIndices = new Set(Object.values(fixedGroupMap));
  const fixedIdx = getFixedGroupIndex(name);
  let targetGroup;
  if (fixedIdx !== -1) {
    if (fixedGroupMap[fixedIdx] !== undefined) {
      targetGroup = groups[fixedGroupMap[fixedIdx]];
    } else {
      const freeGroupIdx = groups.findIndex((g, gi) =>
        !claimedGroupIndices.has(gi) && g.members.length < maxPerGroup
      );
      if (freeGroupIdx !== -1) {
        fixedGroupMap[fixedIdx] = freeGroupIdx;
        targetGroup = groups[freeGroupIdx];
      }
    }
  } else {
    targetGroup = groups.find((g, gi) =>
      !claimedGroupIndices.has(gi) && g.members.length < maxPerGroup
    );
    if (!targetGroup) targetGroup = groups.find(g => g.members.length < maxPerGroup);
  }
  if (!targetGroup) targetGroup = groups[groups.length - 1];
  return targetGroup;
}

function assignToGroupSilent(name, indexInRemaining) {
  const targetGroup = getTargetGroup(name);
  targetGroup.members.push(name);
  remaining.splice(indexInRemaining, 1);
  renderGroups();
  updateProgress();
}

function assignToGroup(name, indexInRemaining) {
  assignToGroupSilent(name, indexInRemaining);
}

document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('open');
});

function renderGroups() {
  const grid = document.getElementById('groupsGrid');
  const cols = groups.length <= 2 ? 1 : groups.length <= 4 ? 2 : 3;
  grid.style.gridTemplateColumns = `repeat(${Math.min(cols, groups.length)}, 1fr)`;
  grid.innerHTML = '';

  groups.forEach((g, gi) => {
    const card = document.createElement('div');
    card.className = 'group-card';
    card.innerHTML = `
      <div class="group-header">
        <div class="group-badge" style="background:${g.color}">${gi+1}</div>
        <span class="group-name">${g.name}</span>
        <span class="group-count">${g.members.length}/${maxPerGroup} người</span>
      </div>
      <div class="member-chips">
        ${g.members.map(m => `<span class="chip assigned">${m}</span>`).join('')}
        ${g.members.length === 0 ? '<span style="font-size:13px;color:rgba(253,246,227,.25)">Đang chờ thành viên...</span>' : ''}
      </div>`;
    grid.appendChild(card);
  });
}

function updateProgress() {
  const done = originalMembers.length - remaining.length;
  const total = originalMembers.length;
  const pct = total === 0 ? 0 : Math.round(done / total * 100);
  document.getElementById('progressText').textContent = done + ' / ' + total + ' người đã chia';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
}

function finishAll() {
  ['wheelCanvas','wheelGlow','wheelRing','wheelPointer','centerHub','currentPick','progressSection','spinBtn']
    .forEach(id => document.getElementById(id).style.display = 'none');
    
  document.getElementById('emptyWheel').style.display = 'flex';
  document.getElementById('emptyWheel').innerHTML = '<span class="big-icon">🎊</span><p style="color:var(--gold); font-weight:bold">Hoàn thành! Tất cả thành viên đã được chia nhóm hoàn toàn.</p>';
  document.getElementById('actionRow').style.display = 'flex';
  setupAudioEvents();
}

function quickAssignAll() {
  if (!confirm('Hệ thống sẽ xếp nhanh tự động toàn bộ số người còn lại vào các nhóm?')) return;
  
  while(remaining.length > 0) {
    const nextPerson = remaining[0];
    let targetGroup = groups.find(g => g.members.length < maxPerGroup);
    if (!targetGroup) targetGroup = groups[groups.length - 1];
    
    targetGroup.members.push(nextPerson);
    remaining.shift();
  }
  
  renderGroups();
  updateProgress();
  finishAll();
}

function exportResult() {
  let text = '=== KẾT QUẢ CHIA NHÓM CHÍNH THỨC ===\n\n';
  groups.forEach(g => {
    text += `${g.name} (${g.members.length} thành viên):\n`;
    g.members.forEach((m, i) => text += `  ➔ [${i+1}] ${m}\n`);
    text += '\n';
  });
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('exportBtn');
    btn.textContent = '✅ Đã sao chép!';
    setTimeout(() => btn.textContent = '📋 Sao chép kết quả', 2000);
  });
}

function launchConfetti() {
  const colors = ['#E8B84B','#C0392B','#8E44AD','#16A085','#2980B9'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random()*100 + 'vw';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDelay = Math.random()*.4 + 's';
    el.style.animationDuration = (1.5+Math.random()*1.5) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
}

// Khởi chạy hệ thống âm thanh lần đầu
setupAudioEvents();
